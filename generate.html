<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Buat Tugas - Star Tools</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #F1F5F9; color: #0F172A; }
  body.dark { background: #0B1120; color: #F1F5F9; }
  body.dark .card, body.dark .app-header, body.dark .alert-box { background: #111827; border-color: #1E293B; }
  body.dark input, body.dark textarea { background: #1E293B; border-color: #334155; color: #F1F5F9; }
  body.dark input::placeholder, body.dark textarea::placeholder { color: #64748B; }

  .app-container { max-width: 560px; margin: 0 auto; background: #F1F5F9; min-height: 100vh; }
  body.dark .app-container { background: #0B1120; }

  .app-header {
    background: #FFFFFF; padding: 16px 20px; display: flex; align-items: center;
    justify-content: space-between; border-bottom: 1px solid #E2E8F0;
    position: sticky; top: 0; z-index: 20;
  }
  body.dark .app-header { background: #111827; border-bottom-color: #1E293B; }

  .logo-area { display: flex; align-items: center; gap: 12px; }
  .app-title { font-weight: 700; font-size: 20px; background: linear-gradient(135deg, #2563EB, #60A5FA); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .close-btn {
    width: 40px; height: 40px; background: rgba(0,0,0,0.05); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: 0.2s; border: none;
  }
  body.dark .close-btn { background: rgba(255,255,255,0.05); }
  .close-btn:active { transform: scale(0.92); }
  .close-btn svg { stroke: #0F172A; width: 22px; height: 22px; }
  body.dark .close-btn svg { stroke: #F1F5F9; }

  .screen { padding: 20px 18px 30px; flex: 1; }
  .card {
    background: #FFFFFF; border-radius: 28px; padding: 20px;
    margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    border: 1px solid #E2E8F0;
  }
  .title { font-size: 18px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .sub { font-size: 14px; color: #64748B; margin-bottom: 16px; line-height: 1.5; }
  body.dark .sub { color: #94A3B8; }

  input, textarea {
    width: 100%; padding: 14px 16px; border-radius: 14px;
    border: 1px solid #E2E8F0; background: #FFFFFF; color: #0F172A;
    font-size: 14px; margin-bottom: 12px; font-family: inherit;
  }
  input:focus, textarea:focus { outline: none; border-color: #2563EB; }
  textarea { min-height: 100px; resize: vertical; }

  .btn {
    width: 100%; padding: 14px; border: none; border-radius: 14px;
    background: #2563EB; color: white; font-weight: 600; font-size: 15px;
    cursor: pointer; transition: 0.2s;
  }
  .btn:active { transform: scale(0.97); background: #1D4ED8; }

  .limit-info {
    background: #F1F5F9; padding: 12px 16px; border-radius: 12px;
    margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;
  }
  body.dark .limit-info { background: #1E293B; }
  .limit-info .label { font-size: 13px; color: #64748B; }
  body.dark .limit-info .label { color: #94A3B8; }
  .limit-info .count { font-size: 15px; font-weight: 700; color: #2563EB; }
  body.dark .limit-info .count { color: #60A5FA; }

  .link-box {
    background: #F8FAFE; border: 1px solid #E2E8F0; border-radius: 12px;
    padding: 12px 14px; margin-top: 12px; display: flex; align-items: center; gap: 10px;
  }
  body.dark .link-box { background: #1E293B; border-color: #334155; }
  .link-box .link-text { flex: 1; font-size: 13px; color: #2563EB; font-weight: 500; word-break: break-all; }
  body.dark .link-box .link-text { color: #60A5FA; }
  .link-box .copy-btn {
    background: #E2E8F0; border: none; padding: 6px 14px; border-radius: 8px;
    font-size: 12px; font-weight: 600; cursor: pointer; color: #0F172A; white-space: nowrap;
  }
  body.dark .link-box .copy-btn { background: #334155; color: #F1F5F9; }
  .link-box .copy-btn:active { transform: scale(0.95); }

  .hidden { display: none !important; }

  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: #1E293B; color: white; padding: 12px 24px; border-radius: 14px;
    font-size: 14px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 300;
    border-left: 4px solid #34D399;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { border-left-color: #F87171; }

  .alert-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
    display: none; justify-content: center; align-items: center; z-index: 200;
  }
  .alert-box {
    background: #FFFFFF; width: 300px; border-radius: 28px;
    padding: 24px 22px; text-align: center; border: 1px solid #E2E8F0;
  }
  body.dark .alert-box { background: #111827; border-color: #1E293B; }
  .alert-box p { font-size: 15px; line-height: 1.6; margin-bottom: 20px; white-space: pre-line; }
  .alert-box .btn { background: #2563EB; border: none; color: white; font-weight: 600; padding: 12px; border-radius: 40px; font-size: 14px; width: 100%; cursor: pointer; }

  .footer-app { text-align: center; padding: 20px; font-size: 12px; color: #64748B; border-top: 1px solid #E2E8F0; }
  body.dark .footer-app { color: #94A3B8; border-top-color: #1E293B; }
</style>
</head>
<body>

<div class="app-container">
  <div class="app-header">
    <div class="logo-area">
      <span class="app-title">Star Tools • Buat Tugas</span>
    </div>
    <button class="close-btn" onclick="window.location.href='/'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="screen">
    <div class="card">
      <div class="title">📝 Buat Tugas Baru</div>
      <div class="sub">Buat tugas dengan link unik. Bagikan link ke murid-muridmu.</div>

      <div class="limit-info">
        <span class="label">Tugas yang bisa dibuat minggu ini</span>
        <span class="count" id="sisaKuota">10 / 10</span>
      </div>

      <input type="text" id="judul" placeholder="Judul Tugas">
      <textarea id="deskripsi" placeholder="Deskripsi tugas..."></textarea>
      <input type="number" id="durasi" placeholder="Durasi pengerjaan (menit)" value="60">
      <input type="number" id="hapus" placeholder="Hapus setelah (hari)" value="7">

      <button class="btn" onclick="buatTugas()">🚀 Buat Tugas & Dapatkan Link</button>

      <div id="linkResult" class="hidden" style="margin-top:16px;">
        <div style="font-weight:600;margin-bottom:6px;">✅ Link Tugas:</div>
        <div class="link-box">
          <span class="link-text" id="linkTugas">https://...</span>
          <button class="copy-btn" onclick="copyLink()">Salin</button>
        </div>
        <div style="font-size:12px;color:#94A3B8;margin-top:8px;">Bagikan link ini ke murid-muridmu.</div>
      </div>
    </div>
  </div>

  <div class="footer-app"><p>Star Platform | Star Tools 2026</p></div>
</div>

<div id="alert" class="alert-overlay">
  <div class="alert-box">
    <p id="alertMsg">Pesan</p>
    <button class="btn" onclick="closeAlert()">Mengerti</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgr_nHqvpMsiG4lBkYckzxRErkskXj_6E",
  authDomain: "laporanstartools-c18b2.firebaseapp.com",
  databaseURL: "https://laporanstartools-c18b2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "laporanstartools-c18b2",
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();
const auth = firebase.auth();

let currentUser = null;

auth.onAuthStateChanged(function(user) {
  if (user) {
    currentUser = user;
    loadLimit();
  } else {
    window.location.href = 'login.html';
  }
});

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.innerText = msg;
  t.className = 'toast show';
  if (type === 'error') t.classList.add('error');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function showAlert(msg) {
  document.getElementById('alertMsg').innerText = msg;
  document.getElementById('alert').style.display = 'flex';
}

function closeAlert() {
  document.getElementById('alert').style.display = 'none';
}

function copyLink() {
  var text = document.getElementById('linkTugas').innerText;
  navigator.clipboard.writeText(text).then(function() {
    showToast('✅ Link disalin!');
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ Link disalin!');
  });
}

function generateKode() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var kode = '';
  for (var i = 0; i < 8; i++) {
    kode += chars[Math.floor(Math.random() * chars.length)];
  }
  return kode;
}

function getMinggu() {
  var now = new Date();
  var start = new Date(now.getFullYear(), 0, 1);
  var diff = (now - start) / 86400000;
  return Math.ceil((diff + start.getDay() + 1) / 7);
}

function loadLimit() {
  if (!currentUser) return;
  db.ref('users/' + currentUser.uid + '/tugas_limit').once('value').then(function(snap) {
    var maxLimit = 10;
    var data = snap.val() || { minggu: getMinggu(), jumlah: 0, max: maxLimit };
    if (data.minggu !== getMinggu()) {
      data.minggu = getMinggu();
      data.jumlah = 0;
      data.max = maxLimit;
    }
    var sisa = data.max - data.jumlah;
    document.getElementById('sisaKuota').innerText = sisa + ' / ' + data.max;
  });
}

function buatTugas() {
  if (!currentUser) {
    showAlert('Silakan login terlebih dahulu!');
    return;
  }

  var judul = document.getElementById('judul').value.trim();
  var deskripsi = document.getElementById('deskripsi').value.trim();
  var durasi = parseInt(document.getElementById('durasi').value);
  var hapus = parseInt(document.getElementById('hapus').value) || 7;

  if (!judul) {
    showAlert('Judul tugas wajib diisi!');
    return;
  }

  if (!durasi || durasi < 1) {
    showAlert('Durasi pengerjaan wajib diisi!');
    return;
  }

  if (durasi > 180) {
    showAlert('Durasi maksimal 180 menit!');
    return;
  }

  if (hapus > 30) {
    showAlert('Masa hapus maksimal 30 hari!');
    return;
  }

  var kode = generateKode();

  var data = {
    judul: judul,
    deskripsi: deskripsi || 'Tidak ada deskripsi',
    pembuat_id: currentUser.uid,
    pembuat_nama: currentUser.displayName || currentUser.email || 'User',
    durasi: durasi,
    waktu_hapus: hapus,
    created_at: Date.now(),
    status: 'aktif',
    kode: kode
  };

  db.ref('tugas/' + kode).set(data).then(function() {
    var maxLimit = 10;
    db.ref('users/' + currentUser.uid + '/tugas_limit').transaction(function(current) {
      if (!current) current = { minggu: getMinggu(), jumlah: 0, max: maxLimit };
      if (current.minggu !== getMinggu()) {
        current.minggu = getMinggu();
        current.jumlah = 0;
      }
      current.jumlah = (current.jumlah || 0) + 1;
      return current;
    });

    var link = window.location.origin + '/demo-stools/tugas.html?kode=' + kode;
    document.getElementById('linkTugas').innerText = link;
    document.getElementById('linkResult').classList.remove('hidden');
    document.getElementById('linkResult').scrollIntoView({ behavior: 'smooth' });

    document.getElementById('judul').value = '';
    document.getElementById('deskripsi').value = '';
    loadLimit();
    showToast('✅ Tugas berhasil dibuat!');
  }).catch(function(err) {
    showAlert('Gagal membuat tugas: ' + err.message);
  });
}

if (localStorage.getItem('theme') === 'dark') {
  document.body.classList.add('dark');
}
</script>

</body>
</html>
