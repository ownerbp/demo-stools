<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Buat Tugas - Star Tools</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #F1F5F9;
    color: #0F172A;
    padding: 20px;
    max-width: 560px;
    margin: 0 auto;
  }

  .card {
    background: white;
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 20px;
  }

  .title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .sub {
    font-size: 14px;
    color: #64748B;
    margin-bottom: 20px;
  }

  input, textarea {
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: 1px solid #E2E8F0;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 12px;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: #2563EB;
  }

  textarea {
    min-height: 100px;
    resize: vertical;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: #2563EB;
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn:active {
    transform: scale(0.97);
    background: #1D4ED8;
  }

  .btn-secondary {
    background: #E2E8F0;
    color: #0F172A;
  }

  .btn-secondary:active {
    background: #CBD5E1;
  }

  .link-box {
    background: #F8FAFE;
    border: 1px solid #E2E8F0;
    border-radius: 12px;
    padding: 12px 14px;
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .link-box .link-text {
    flex: 1;
    font-size: 13px;
    color: #2563EB;
    font-weight: 500;
    word-break: break-all;
  }

  .link-box .copy-btn {
    background: #E2E8F0;
    border: none;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: #0F172A;
    white-space: nowrap;
  }

  .link-box .copy-btn:active {
    transform: scale(0.95);
  }

  .hidden {
    display: none !important;
  }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #1E293B;
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 999;
  }

  .toast.show {
    opacity: 1;
  }

  .alert-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
  }

  .alert-box {
    background: white;
    width: 300px;
    border-radius: 24px;
    padding: 24px;
    text-align: center;
  }

  .alert-box p {
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 16px;
    white-space: pre-line;
  }

  .alert-box .btn {
    background: #2563EB;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 40px;
    font-weight: 600;
    width: 100%;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="card">
  <div class="title">📝 Buat Tugas</div>
  <div class="sub">Buat tugas dan dapatkan link unik untuk dibagikan ke murid.</div>

  <input type="text" id="judul" placeholder="Judul Tugas">
  <textarea id="deskripsi" placeholder="Deskripsi tugas..."></textarea>
  <input type="number" id="durasi" placeholder="Durasi pengerjaan (menit)" value="60">
  <input type="number" id="hapus" placeholder="Hapus setelah (hari)" value="7">

  <button class="btn" onclick="buatTugas()">🚀 Buat Tugas & Dapatkan Link</button>

  <div id="linkResult" class="hidden" style="margin-top:16px;">
    <div style="font-weight:600;margin-bottom:6px;">✅ Link Tugas:</div>
    <div class="link-box">
      <span class="link-text" id="linkTugas">https://...</span>
      <button class="copy-btn" onclick="copyLink()">Salin</button>
    </div>
    <div style="font-size:12px;color:#94A3B8;margin-top:8px;">Bagikan link ini ke murid-muridmu.</div>
  </div>
</div>

<div id="alert" class="alert-overlay">
  <div class="alert-box">
    <p id="alertMsg">Pesan</p>
    <button class="btn" onclick="closeAlert()">Mengerti</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDgr_nHqvpMsiG4lBkYckzxRErkskXj_6E",
  authDomain: "laporanstartools-c18b2.firebaseapp.com",
  databaseURL: "https://laporanstartools-c18b2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "laporanstartools-c18b2",
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();

let lastKode = '';

function showToast(msg) {
  var t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function showAlert(msg) {
  document.getElementById('alertMsg').innerText = msg;
  document.getElementById('alert').style.display = 'flex';
}

function closeAlert() {
  document.getElementById('alert').style.display = 'none';
}

function copyLink() {
  var text = document.getElementById('linkTugas').innerText;
  navigator.clipboard.writeText(text).then(function() {
    showToast('✅ Link disalin!');
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ Link disalin!');
  });
}

function generateKode() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var kode = '';
  for (var i = 0; i < 8; i++) {
    kode += chars[Math.floor(Math.random() * chars.length)];
  }
  return kode;
}

function buatTugas() {
  var judul = document.getElementById('judul').value.trim();
  var deskripsi = document.getElementById('deskripsi').value.trim();
  var durasi = parseInt(document.getElementById('durasi').value);
  var hapus = parseInt(document.getElementById('hapus').value) || 7;

  if (!judul) {
    showAlert('Judul tugas wajib diisi!');
    return;
  }

  if (!durasi || durasi < 1) {
    showAlert('Durasi pengerjaan wajib diisi!');
    return;
  }

  var kode = generateKode();
  lastKode = kode;

  var data = {
    judul: judul,
    deskripsi: deskripsi || 'Tidak ada deskripsi',
    durasi: durasi,
    waktu_hapus: hapus,
    created_at: Date.now(),
    status: 'aktif',
    kode: kode
  };

  db.ref('tugas/' + kode).set(data).then(function() {
    var link = window.location.origin + '/demo-stools/tugas.html?kode=' + kode;
    document.getElementById('linkTugas').innerText = link;
    document.getElementById('linkResult').classList.remove('hidden');
    document.getElementById('linkResult').scrollIntoView({ behavior: 'smooth' });
    
    document.getElementById('judul').value = '';
    document.getElementById('deskripsi').value = '';
    
    showToast('✅ Tugas berhasil dibuat!');
  }).catch(function(err) {
    showAlert('Gagal membuat tugas: ' + err.message);
  });
}
</script>

</body>
</html>
