<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - Star Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
/* ==========================================================================
   DESAIN BARU: MODERN PREMIUM (ALA INSTAGRAM/DARK GLOW)
   Semua element & class disesuaikan tanpa merusak struktur ID/Fungsi JS asli.
   ========================================================================== */
* {
  box-sizing: border-box;
  transition: all 0.3s ease;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: radial-gradient(circle at top right, #1a1528, #09070f);
  color: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

/* CARD CONTAINER */
.container {
  width: 100%;
  max-width: 380px;
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 40px 30px;
  border-radius: 24px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
              0 0 50px rgba(138, 43, 226, 0.15);
  text-align: center;
}

/* TEXT ATAS (QUOTES/TAGLINE) */
.brand-wrapper {
  margin-bottom: 30px;
}

h2 {
  font-size: 28px;
  font-weight: 700;
  margin: 0 0 8px 0;
  background: linear-gradient(45deg, #a855f7, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}

.tagline {
  font-size: 13px;
  color: #94a3b8;
  margin: 0;
  line-height: 1.5;
}

/* INPUT BOXES */
.input-group {
  margin-bottom: 16px;
  text-align: left;
}

input {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  color: #ffffff;
  font-size: 14px;
  outline: none;
}

input:focus {
  background: rgba(255, 255, 255, 0.08);
  border-color: #a855f7;
  box-shadow: 0 0 12px rgba(168, 85, 247, 0.2);
}

input::placeholder {
  color: #64748b;
}

/* TOMBOL UTAMA */
button#actionBtn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #a855f7, #6366f1);
  color: #ffffff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
  box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
}

button#actionBtn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4);
}

button#actionBtn:active {
  transform: translateY(0) scale(0.98);
}

/* SWITCH LINKS */
.switch-container {
  margin-top: 25px;
  border-top: 1px solid rgba(255, 255, 255, 0.08);
  padding-top: 20px;
}

.switch {
  font-size: 13px;
  color: #94a3b8;
  cursor: pointer;
  margin-bottom: 12px;
}

.switch span {
  color: #3b82f6;
  font-weight: 600;
}

.switch span:hover {
  text-decoration: underline;
}

.switch-guest {
  font-size: 13px;
  color: #64748b;
  cursor: pointer;
  display: inline-block;
}

.switch-guest:hover {
  color: #94a3b8;
}

/* CUSTOM ALERT OVERLAY */
#customAlert {
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

#customAlert > div {
  background: #110f18 !important;
  border: 1px solid rgba(255, 255, 255, 0.1) !important;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
  padding: 30px !important;
}

#customAlert p#alertMsg {
  font-family: inherit;
  font-size: 15px;
  color: #e2e8f0 !important;
}

#customAlert button {
  background: linear-gradient(135deg, #ef4444, #b91c1c) !important;
  font-weight: 600 !important;
  padding: 12px !important;
}
</style>
</head>

<body>

<div class="container">

  <div class="brand-wrapper">
    <h2 id="title">Login</h2>
    <p class="tagline">"Jelajahi kreativitas tanpa batas. Kembangkan potensimu bersama ekosistem alat digital terbaik."</p>
  </div>

  <div class="input-group">
    <input type="text" id="username" placeholder="Username" style="display:none;">
  </div>
  <div class="input-group">
    <input type="email" id="email" placeholder="Email">
  </div>
  <div class="input-group">
    <input type="password" id="password" placeholder="Password">
  </div>

  <button id="actionBtn" onclick="login()">Login</button>

  <div class="switch-container">
    <div class="switch" onclick="toggleMode()">
      Belum punya akun? <span>Daftar</span>
    </div>

    <div class="switch-guest" onclick="skipLogin()">
      Lewati login (Masuk sebagai Guest)
    </div>
  </div>

</div>

<div id="customAlert" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center;">
  <div style="background: #000; padding:20px; border-radius:18px; width:85%; max-width:320px; text-align:center;">
    <p id="alertMsg" style="color:white; margin-bottom:20px;"></p>
    <button onclick="closeCustomAlert()" style="background:#1e1e1e; color:white; border:none; padding:10px; border-radius:10px; width:100%; cursor:pointer;">
      OK
    </button>
  </div>
</div>

<script>
// ==========================================================================
// LOGIKA JAVASCRIPT ASLI (SAMA SEKALI TIDAK DIUBAH ATAU DIKURANGI)
// ==========================================================================

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDgr_nHqvpMsiG4lBkYckzxRErkskXj_6E",
  authDomain: "laporanstartools-c18b2.firebaseapp.com",
  databaseURL: "https://laporanstartools-c18b2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "laporanstartools-c18b2",
  storageBucket: "laporanstartools-c18b2.firebasestorage.app",
  messagingSenderId: "596585220522",
  appId: "1:596585220522:web:d61e13c60daff6daca43d3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let isLogin = true;

// AUTO REDIRECT
firebase.auth().onAuthStateChanged(user => {
  if (user) {
    window.location.href = "index.html";
  }
});

// SWITCH LOGIN / SIGNUP
function toggleMode() {
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Login" : "Daftar";
  document.getElementById("actionBtn").innerText = isLogin ? "Login" : "Daftar";

  document.getElementById("username").style.display = isLogin ? "none" : "block";

  document.querySelector(".switch").innerHTML = isLogin
    ? 'Belum punya akun? <span>Daftar</span>'
    : 'Sudah punya akun? <span>Login</span>';
}

// SIGNUP
function signup() {
  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !email || !password) {
    showCustomAlert("Harap Isi Semua Data!");
    return;
  }

  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then(res => {
      const uid = res.user.uid;

      return db.ref("users/" + uid).set({
        username: username,
        email: email,
        premium: false,
        createdAt: Date.now()
      });
    })
.then(() => {
  const redirect = localStorage.getItem("redirectAfterLogin");

  if(redirect){
    localStorage.removeItem("redirectAfterLogin");
    window.location.href = redirect;
  } else {
    window.location.href = "index.html";
  }
})
    .catch(err => showCustomAlert(err.message));
}


// LOGIN
function login() {
  if (!isLogin) {
    signup();
    return;
  }

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {
      window.location.href = "index.html";
    })
    .catch(err => showCustomAlert(err.message));
}


// ALERT CUSTOM
function showCustomAlert(text) {
  document.getElementById("alertMsg").innerText = text;
  document.getElementById("customAlert").style.display = "flex";
}

function closeCustomAlert() {
  document.getElementById("customAlert").style.display = "none";
}

function skipLogin(){
  localStorage.setItem("isGuest", "true");
  window.location.href = "index.html";
}

</script>

</body>
</html>
