// LOAD CHAT REALTIME - PERFECT
function loadChat(uid) {
  const chatBox = document.getElementById("chatBox");
  if (!uid || !chatBox) return;

  const ref = db.ref("chats/" + uid).limitToLast(50);

  ref.off();
  ref.on("value", snapshot => {
    const messages = [];
    snapshot.forEach(child => {
      messages.push({ id: child.key, ...child.val() });
    });

    // Gunakan DocumentFragment agar render lebih cepat dan tidak flicker
    const fragment = document.createDocumentFragment();
    messages.forEach(msg => {
      const bubble = createMessageElement(msg); // Gunakan fungsi terpisah
      fragment.appendChild(bubble);
    });

    chatBox.innerHTML = "";
    chatBox.appendChild(fragment);
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// Fungsi pembantu agar kode lebih bersih
function createMessageElement(msg) {
  const bubble = document.createElement("div");
  bubble.classList.add("chat-bubble", msg.sender);
  
  const date = new Date(msg.timestamp);
  const timeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
  
  const isVip = msg.sender === "admin" ? `<span class="verified-badge"><svg viewBox="0 0 24 24" width="14" height="14"><path d="M12 2l2.2 2 3-.5.8 2.9 2.9.8-.5 3 2 2-2 2 .5 3-2.9.8-.8 2.9-3-.5-2.2 2-2.2-2-3 .5-.8-2.9-2.9-.8.5-3-2-2 2-2-.5-3 2.9-.8.8-2.9 3 .5z" fill="#4fc3f7"/><path d="M8 12.5l2.5 2.5 5.5-6" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>` : "";

  bubble.innerHTML = `
    <div class="chat-wrapper">
      <div class="chat-name">${msg.sender === "admin" ? "Nita | AI Asisten" : "Kamu"} ${isVip}</div>
      <div class="chat-text">${msg.text}</div>
      <div class="chat-time">${timeStr}</div>
    </div>
  `;
  return bubble;
}


// ✅ MISSING: renderMessage function
function renderMessage(msg) {
  const chatBox = document.getElementById("chatBox");
  const bubble = document.createElement("div");
  bubble.classList.add("chat-bubble", msg.sender);
  bubble.dataset.msgId = msg.id;

  const wrapper = document.createElement("div");
  wrapper.classList.add("chat-wrapper");

  const name = document.createElement("div");
  name.classList.add("chat-name");

  const text = document.createElement("div");
  text.classList.add("chat-text");
  text.innerText = msg.text || "";

  const time = document.createElement("div");
  time.classList.add("chat-time");
  
  const date = new Date(msg.timestamp);
  time.innerText = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;

  if (msg.sender === "admin") {
    const span = document.createElement("span");
    span.innerText = "Nita | AI Asisten";

    const verified = document.createElement("span");
    verified.classList.add("verified-badge");
    verified.innerHTML = `
      <svg viewBox="0 0 24 24" width="18" height="18">
        <path d="M12 2l2.2 2 3-.5.8 2.9 2.9.8-.5 3 2 2-2 2 .5 3-2.9.8-.8 2.9-3-.5-2.2 2-2.2-2-3 .5-.8-2.9-2.9-.8.5-3-2-2 2-2-.5-3 2.9-.8.8-2.9 3 .5z" fill="#4fc3f7"/>
        <path d="M8 12.5l2.5 2.5 5.5-6" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    `;

    name.append(span, verified);
  } else {
    name.innerText = "Kamu";
    
    const deleteBtn = document.createElement("span");
    deleteBtn.innerHTML = `
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#888" stroke-width="2">
        <path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/>
      </svg>
    `;
    deleteBtn.style.cssText = "cursor:pointer;margin-left:6px;opacity:.7;transition:opacity .2s";
    deleteBtn.title = "Hapus pesan";
    deleteBtn.onclick = () => deleteMessage(msg.id);
    
    name.appendChild(deleteBtn);
  }

  wrapper.append(name, text, time);
  bubble.appendChild(wrapper);
  chatBox.appendChild(bubble);
}

// ✅ PERFECT: detectStyle (unchanged)
function detectStyle(text) {
  const santai = ["gw", "gue", "lu", "lo", "bro", "bre"];
  const formal = ["aku", "saya", "kamu", "anda"];
  let santaiScore = 0, formalScore = 0;
  santai.forEach(k => text.includes(k) && santaiScore++);
  formal.forEach(k => text.includes(k) && formalScore++);
  return santaiScore > formalScore ? "santai" : "formal";
}

/**
 * Fungsi Auto Reply Utama
 * Menangani logika percakapan dari input pengguna hingga output balasan.
 */
function autoReply(userText) {
  // Tahap Awal: Normalisasi Teks
  const text = userText.toLowerCase().trim();
  
  // 1. Contextual Matching (Prioritas Tinggi)
  // Menangani pertanyaan spesifik tentang tokoh atau brand tertentu
  if (text.includes("siapa") && (text.includes("bintang") || text.includes("founder"))) {
      return typeReply("Bintang Ramadhan itu pendiri Star Tools, orangnya keren banget dalam hal coding! 😎");
  }

  // 2. Apresiasi untuk Penjelasan Panjang
  // Jika user mengetik panjang tapi tidak ada match di database, berikan validasi
  if (text.length > 50 && !findBestMatch(text)) {
      return typeReply("Wah, penjelasanmu menarik dan detail banget. Nita lagi coba pahami lebih dalam, tapi intinya kamu hebat banget sudah share itu! ✨");
  }

  // 3. Pencarian Database (Brain Logic)
  const match = findBestMatch(text);

  if (match) {
    let reply = randomReply(match.replies); // Ambil salah satu variasi balasan
    
    // 4. Adaptasi Gaya Bahasa Otomatis
    const style = detectStyle(text);
    if (style === "santai") {
        // Mengubah kata ganti formal ke santai secara dinamis
        reply = reply
            .replace(/\bsaya\b|\baku\b/gi, "gw")
            .replace(/\bkamu\b|\banda\b/gi, "lu")
            .replace(/\bsudah\b/gi, "udah")
            .replace(/\btidak\b/gi, "gak");
    }
    return typeReply(reply);
  }

  // 5. Fallback (Jika tidak ada match sama sekali)
  return handleFallback(text);
}

/**
 * Helper: Menangani kondisi ketika bot bingung
 */
function handleFallback(text) {
    if (text.length < 5) {
        return typeReply("Eh? Singkat amat jawabnya. Coba ceritain lebih banyak dong ke Nita! 💬");
    }
    
    const defaultReplies = [
        "Hmm, Nita belum terlalu paham bagian itu, tapi ceritain lagi dong biar Nita makin pinter! 💡",
        "Eh, maksudnya gimana tuh? Coba jelasin pakai bahasa yang lebih simpel. 😄",
        "Wah, Nita baru denger nih! Kamu emang punya banyak wawasan ya. ✨"
    ];
    return typeReply(randomReply(defaultReplies));
}

/**
 * Helper: Deteksi Gaya Bahasa
 */
function detectStyle(text) {
    const slangWords = ['lu', 'gw', 'ga', 'gak', 'kalo', 'banget', 'keren', 'nih', 'tuh'];
    return slangWords.some(word => text.includes(word)) ? "santai" : "formal";
}

// ✅ FIXED: Clean matching algorithm
function findBestMatch(text) {
// 🔥 FULL PRIORITY (13 Categories)
const priority = [
  "startools",      // ⭐ #1 Star Tools (30 keywords)
  "emotion",        // Emosi (25 keywords)
  "system",         // Bug/error (20 keywords)
  "education",      // Mata pelajaran (25 keywords)
  "studyhelp",      // Tips belajar (20 keywords)
  "greeting",       // Sapaan (15 keywords)
  "premium",        // Monetisasi (10 keywords)
  "career",         // Karir (15 keywords)
  "knowledge",      // Tech info (35 keywords)
  "casual",         // Santai (25 keywords)
  "gratitude",      // Terima kasih (8 keywords)
  "identity",       // Tentang Nita (12 keywords)
  "relationship"    // Relasi (12 keywords)
];

const cleanText = text.split(/\s+/);
  
  let bestMatch = null, highestScore = 0;

  for (const cat of priority) {
    for (const item of (brain[cat] || [])) {
      const score = calculateScore(text, cleanText, item.keywords);
      if (score > highestScore) {
        highestScore = score;
        bestMatch = item;
      }
    }
    if (highestScore >= 12) break;
  }
  
  return highestScore > 3 ? bestMatch : null;
}

function calculateScore(text, cleanText, keywords) {
  let score = 0;
  for (const keyword of keywords) {
    if (text.includes(keyword)) return 15; // Instant win
    for (const word of cleanText) {
      if (word === keyword) {
        score += 8;
      } else {
        const similarity = 1 - levenshtein(word, keyword) / Math.max(word.length, keyword.length);
        if (similarity > 0.8) score += 4;
        else if (similarity > 0.7) score += 2;
      }
    }
  }
  return score;
}

// ✅ Levenshtein (perfect)
function levenshtein(a, b) {
  const matrix = Array(b.length + 1).fill().map(() => Array(a.length + 1));
  for (let i = 0; i <= b.length; i++) matrix[i][0] = i;
  for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
  
  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      matrix[i][j] = b[i-1] === a[j-1] 
        ? matrix[i-1][j-1] 
        : Math.min(matrix[i-1][j-1], matrix[i][j-1], matrix[i-1][j]) + 1;
    }
  }
  return matrix[b.length][a.length];
}

}

document.addEventListener("DOMContentLoaded", () => {
  firebase.auth().onAuthStateChanged(user => {
    if (!user) {
      setTimeout(() => {
        showAlert("Harap Login Terlebih Dahulu!");
        window.location.href = "login.html";
      }, 100);
      return;
    }
    loadChat(user.uid);
  });

  const input = document.getElementById("chatInput");
  if (input) {
    input.addEventListener("keypress", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  }
});




// SIDEBAR 
function openSidebar() {
  document.getElementById("sidebar").classList.add("active");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("active");
}


// SIDEBAR BACK
function goTo(page) {
  localStorage.setItem("targetPage", page);
  localStorage.setItem("activePage", page); // bonus
  window.location.href = "index.html";
}

</script>
